name: build_go

# E2E test: a real wrangle @v0.3.0 tagged build, verified against the
# STRICT wrangle-vsa-consumer-v1 policy. No create-release job —
# wrangle @v0.3.0 auto-creates the release for the tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-go:
    permissions:
      actions: read
      security-events: write
      contents: write
      id-token: write
      attestations: write
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.3.0 # zizmor: ignore[unpinned-uses] - immutable
    with:
      path: "."
      scan-tools: "osv zizmor wrangle-lint"
