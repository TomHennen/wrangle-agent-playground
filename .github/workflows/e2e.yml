name: e2e

# Minimal consumer of wrangle's reusable Python build workflow, used to
# e2e-test pending wrangle PRs against unmerged code. To test a PR,
# change the `@main` ref on the `uses:` line below to the PR's branch.
on:
  push:
  workflow_dispatch:

jobs:
  build-python:
    permissions:
      actions: read           # source scan: Scorecard reads the Actions API
      security-events: write  # source-scan SARIF -> Security tab
      contents: write         # wrangle verify job attaches the signed VSA on tag pushes; GitHub validates called-job permissions at startup, so grant it on every run
      id-token: write         # keyless signing (ambient GitHub OIDC)
      attestations: write     # wrangle attest job (actions/attest-build-provenance)
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_python.yml@attest-sign-metadata-pr1
    with:
      path: python
      release-events: non-pull-request
      scan-tools: zizmor
      policy: policies/wrangle-provenance-python-v1.hjson
